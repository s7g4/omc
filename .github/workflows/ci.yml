name: Continuous Integration

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  rust-ci:
    name: Backend Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Protoc Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check code formatting
        run: cargo fmt --check

      - name: Compile and check types
        run: cargo check --workspace --all-targets

      - name: Run linter (Clippy)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run test suite
        run: cargo test --workspace

  integration-tests:
    name: End-to-End Pipeline Test
    runs-on: ubuntu-latest
    needs: rust-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Protoc Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Start data-plane services
        run: docker compose up -d postgres redis nats --wait

      - name: Run gRPC -> DB -> NATS -> WebSocket integration test
        env:
          TEST_DATABASE_URL: postgresql://postgres:password123@127.0.0.1:5433/omc
        run: cargo test --test e2e_pipeline -p backend -- --nocapture

      - name: Tear down services
        if: always()
        run: docker compose down -v

  frontend-ci:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Build Next.js app
        working-directory: frontend
        run: npm run build
